<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesión | SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[url('@{/assets/Imagenes/Background.jpg}')] bg-cover bg-center flex justify-center items-center min-h-screen">

<div class="bg-blue-100/90 backdrop-blur-sm p-8 rounded-lg shadow-lg flex max-w-2xl w-full">

    <!-- Lado izquierdo -->
    <div class="w-1/3 flex flex-col items-center justify-center p-4 relative">
        <a th:href="@{/home}"
           class="absolute top-0 left-0 text-blue-700 text-xs border border-blue-300 px-1 py-1 rounded hover:bg-blue-200">
            ← Regresar
        </a>

        <img th:src="@{/assets/Imagenes/LogoSkillup.png}" alt="SkillUp Logo" class="w-32 mb-4" />
        <p class="text-center text-gray-600 font-semibold leading-tight">
            Potencia tus habilidades,<br>mejora tu futuro.
        </p>
    </div>

    <!-- Formulario -->
    <div class="w-2/3 p-4">
        <h2 class="text-2xl font-semibold text-center mb-1">Entra en tu cuenta</h2>
        <p class="text-center text-gray-600 mb-4">¡Bienvenido! Por favor ingrese sus datos.</p>

        <!-- Mensaje flash de éxito -->
        <div th:if="${successMessage}"
             class="mb-4 p-3 rounded bg-green-100 text-green-700 border border-green-300 text-center"
             th:text="${successMessage}">
        </div>

        <!-- Mensaje flash de error -->
        <div th:if="${errorMessage}"
             class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-300 text-center"
             th:text="${errorMessage}">
        </div>

        <!-- ⚠️ Eliminé #fields.hasErrors porque no usas th:object -->
        <!-- Si luego usas BindingResult con un DTO de Login, lo reactivamos -->

        <form th:action="@{/login/acceder}" method="post" class="space-y-4" novalidate>



            <!-- Usuario -->
            <div>
                <label for="usuario" class="block text-gray-700">Correo electrónico</label>
                <input type="text"
                       id="usuario"
                       name="usuario"
                       th:value="${usuario}"
                       required
                       placeholder="Ingrese correo electrónico"
                       class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Contraseña -->
            <div>
                <label for="password" class="block text-gray-700">Contraseña</label>
                <div class="relative">
                    <input type="password"
                           id="password"
                           name="password"
                           required
                           minlength="8"
                           placeholder="Ingrese su contraseña"
                           class="w-full p-2 pr-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           title="Mínimo 8 caracteres, una mayúscula, una minúscula y un número" />
                    <button type="button" id="togglePassword"
                            class="absolute right-2 top-2 text-sm text-blue-500 hover:text-blue-700">
                        Mostrar
                    </button>
                </div>
            </div>

            <!-- Recordarme -->
            <div class="flex justify-between text-sm text-gray-600">
                <label><input type="checkbox" name="remember" class="mr-1"> Recordarme</label>
                <a href="#" class="text-blue-500 hover:underline">Olvidé mi contraseña.</a>
            </div>

            <!-- Botón -->
            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                Ingresar
            </button>

            <p class="text-center text-gray-600 text-sm mt-4">
                ¿No tienes cuenta?
                <a th:href="@{/registro}" class="text-blue-500 hover:underline">¡Crea una!</a>
            </p>
        </form>
    </div>
</div>

<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', () => {
        const visible = passwordInput.type === 'password';
        passwordInput.type = visible ? 'text' : 'password';
        togglePassword.textContent = visible ? 'Ocultar' : 'Mostrar';
    });
</script>
</body>
</html>
