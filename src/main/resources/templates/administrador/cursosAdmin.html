<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Administrar Inscripciones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-100 via-white to-purple-50">

<!-- Header -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<!-- Contenedor centrado -->
<div class="flex-grow flex items-center justify-center my-10">
    <div class="max-w-6xl w-full mx-auto bg-white p-10 rounded-3xl shadow-2xl border border-purple-200">
        <h1 class="text-3xl md:text-4xl font-extrabold text-purple-700 text-center mb-10">
            Gestión de Inscripciones
        </h1>

        <!-- FORMULARIO FILTRO -->
        <form th:action="@{/cursosadmin/filtrar}" method="post"
              class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">

            <!-- NOMBRE CURSO -->
            <input name="nombre" type="text"
                   th:value="${oldNombre}"
                   placeholder="Nombre del curso"
                   class="border rounded-xl p-3 w-full">

            <!-- NOMBRE ESTUDIANTE -->
            <input name="estudiante" type="text"
                   th:value="${oldEstudiante}"
                   placeholder="Nombre del estudiante"
                   class="border rounded-xl p-3 w-full">

            <!-- IDENTIFICACIÓN DEL ESTUDIANTE -->
            <input name="identificacion" type="text"
                   th:value="${oldIdentificacion}"
                   placeholder="Identificación"
                   class="border rounded-xl p-3 w-full">

            <!-- Botón Filtrar -->
            <button type="submit"
                    class="bg-purple-700 hover:bg-purple-800 text-white font-semibold rounded-xl shadow px-6 py-3">
                Filtrar
            </button>
        </form>

        <!-- BOTONES DE EXPORTACIÓN -->
        <div class="flex gap-4 mb-6">

            <!-- Exportar a Excel -->
            <form th:action="@{/cursoseval/exportar}" method="get">
                <input type="hidden" name="nombre" th:value="${oldNombre}">
                <input type="hidden" name="estudiante" th:value="${oldEstudiante}">
                <input type="hidden" name="identificacion" th:value="${oldIdentificacion}">
                <button type="submit"
                        class="bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl shadow px-6 py-3 flex items-center gap-2">
                    📊 <span>Exportar a Excel</span>
                </button>
            </form>

            <!-- Exportar PDF -->
            <a href="/api/reportes/cursos/pdf"
               class="bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl shadow px-6 py-3 flex items-center gap-2">
                📄 <span>Generar Reporte PDF</span>
            </a>

        </div>

        <!-- TABLA DE RESULTADOS -->
        <div class="overflow-x-auto">
            <table class="min-w-full border text-center">
                <thead>
                <tr class="bg-purple-200 text-purple-900">
                    <th class="py-3 px-4 border">ID Inscripción</th>
                    <th class="py-3 px-4 border">Curso</th>
                    <th class="py-3 px-4 border">Nombre Estudiante</th>
                    <th class="py-3 px-4 border">Apellido</th>
                    <th class="py-3 px-4 border">Identificación</th>
                    <th class="py-3 px-4 border">Estado</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inscripcion : ${inscripciones}" class="odd:bg-purple-50 even:bg-white">
                    <td class="py-2 px-4 border" th:text="${inscripcion.id}"></td>
                    <td class="py-2 px-4 border" th:text="${inscripcion.curso?.nombre ?: 'N/A'}"></td>
                    <td class="py-2 px-4 border" th:text="${inscripcion.usuario?.nombre ?: 'N/A'}"></td>
                    <td class="py-2 px-4 border" th:text="${inscripcion.usuario?.apellido1 ?: 'N/A'}"></td>
                    <td class="py-2 px-4 border" th:text="${inscripcion.usuario?.identificacion ?: 'N/A'}"></td>
                    <td class="py-2 px-4 border">
                        <span th:text="${inscripcion.estado}"
                              th:classappend="${inscripcion.estado == 'inscrito'} ? 'bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-semibold' : 'bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-sm font-semibold'">
                        </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(inscripciones)}">
                    <td colspan="6" class="py-6 px-4 text-center text-gray-500">
                        No se encontraron inscripciones
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Botón Volver -->
        <div class="text-center mt-10">
            <a th:href="@{/cursosadmin}"
               class="inline-block bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-8 rounded-xl shadow">
                ← Volver
            </a>
        </div>
    </div>
</div>



</body>
</html>
