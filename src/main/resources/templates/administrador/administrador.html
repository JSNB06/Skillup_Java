<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-100 via-white to-purple-50">

<!-- Header -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<!-- Contenedor centrado -->
<div class="flex-grow flex items-center justify-center my-10">
    <div class="max-w-6xl w-full mx-auto bg-white p-10 rounded-3xl shadow-2xl border border-purple-200">
        <h2 class="text-3xl font-extrabold text-purple-700 text-center mb-10">Administrador</h2>

        <!-- Mensaje -->
        <div th:if="${mensaje}"
             class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4"
             role="alert">
            <p th:text="${mensaje}"></p>
        </div>

        <!-- Botones superiores -->
        <div class="flex justify-end mb-6 gap-4">
            <a th:if="${not #lists.isEmpty(usuariosFiltrados)}"
               th:href="@{'/administrador/exportar/' + ${usuariosFiltrados[0].idRol}}"
               class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-semibold shadow">
                Exportar a Excel
            </a>
            <a th:href="@{/administrador/crear}"
               class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-semibold shadow">
                Agregar Usuario
            </a>
        </div>

        <!-- Subtítulo de tabla -->
        <th:block th:with="roles=${T(java.util.Map).of(1, 'Administrador', 2, 'Estudiante', 3, 'Evaluador')}">
            <h3 class="text-lg font-semibold text-gray-700 mb-4 text-center"
                th:if="${not #lists.isEmpty(usuariosFiltrados)}">
                Tabla de Datos del:
                <span th:text="${roles.get(usuariosFiltrados[0].idRol) ?: 'Rol no identificado'}"></span>
            </h3>
        </th:block>

        <!-- Tabla -->
        <div class="w-full overflow-x-auto">
            <table class="w-full border text-center">
                <thead>
                <tr class="bg-purple-200 text-purple-900">
                    <th class="py-3 px-2 border">Identificación</th>
                    <th class="py-3 px-2 border">Nombre</th>
                    <th class="py-3 px-2 border">Primer Apellido</th>
                    <th class="py-3 px-2 border">Segundo Apellido</th>
                    <th class="py-3 px-2 border">Rol</th>
                    <th class="py-3 px-2 border">Correo</th>
                    <th class="py-3 px-2 border min-w-[150px] whitespace-nowrap">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuariosFiltrados}" class="odd:bg-purple-50 even:bg-white">
                    <td class="py-2 px-2 border" th:text="${usuario.identificacion}"></td>
                    <td class="py-2 px-2 border" th:text="${usuario.nombre}"></td>
                    <td class="py-2 px-2 border" th:text="${usuario.apellido1}"></td>
                    <td class="py-2 px-2 border" th:text="${usuario.apellido2}"></td>
                    <td class="py-2 px-2 border">
                        <span th:text="${usuario.idRol != null ? roles.get(usuario.idRol - 1).descripcion : 'Desconocido'}"></span>
                    </td>
                    <td class="py-2 px-2 border" th:text="${usuario.correo}"></td>
                    <td class="py-2 px-2 border min-w-[150px] whitespace-nowrap">
                        <div class="flex justify-center items-center gap-2">
                            <a th:href="@{'/administrador/editar/' + ${usuario.identificacion}}"
                               class="bg-purple-500 hover:bg-purple-600 text-white px-3 py-1 rounded shadow-sm text-sm">
                                Editar
                            </a>
                            <a th:href="@{'/administrador/eliminar/' + ${usuario.identificacion}}"
                               class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded shadow-sm text-sm"
                               onclick="return confirm('¿Estás seguro de que quieres eliminar a este usuario?');">
                                Eliminar
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>



</body>
</html>
