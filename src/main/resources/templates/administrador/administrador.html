<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-100 via-white to-purple-50">

<div class="max-w-6xl mx-auto bg-white p-10 rounded-3xl shadow-2xl border border-purple-200">
    <h2 class="text-3xl font-extrabold text-purple-700 text-center mb-10">Administrador</h2>

    <!-- Botones de acción -->
    <div class="flex justify-end mb-6 gap-4">
        <a th:href="@{'/administrador/exportarExcel/' + ${administrador[0].idRol}}"
           class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-semibold shadow">
            Exportar a Excel
        </a>
        <a th:href="@{/administrador/crear}"
           class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-semibold shadow">
            Agregar Usuario
        </a>
    </div>

    <!-- Título con rol -->
    <h3 class="text-lg font-semibold text-gray-700 mb-4 text-center">
        Tabla de Datos del:
        <span th:text="${#maps.get(roles, administrador[0].idRol)} ?: 'Rol no identificado'"></span>
    </h3>

    <!-- Tabla -->
    <div class="w-full">
        <table class="w-full border text-center">
            <thead>
            <tr class="bg-purple-200 text-purple-900">
                <th class="py-3 px-2 border">Identificación</th>
                <th class="py-3 px-2 border">Nombre</th>
                <th class="py-3 px-2 border">Primer Apellido</th>
                <th class="py-3 px-2 border">Segundo Apellido</th>
                <th class="py-3 px-2 border">Rol</th>
                <th class="py-3 px-2 border">Correo</th>
                <th class="py-3 px-2 border min-w-[150px] whitespace-nowrap">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="role : ${administrador}" class="odd:bg-purple-50 even:bg-white">
                <td class="py-2 px-2 border" th:text="${role.identificacion}"></td>
                <td class="py-2 px-2 border" th:text="${role.nombre}"></td>
                <td class="py-2 px-2 border" th:text="${role.apellido1}"></td>
                <td class="py-2 px-2 border" th:text="${role.apellido2}"></td>
                <td class="py-2 px-2 border" th:text="${#maps.get(roles, role.idRol)} ?: 'Desconocido'"></td>
                <td class="py-2 px-2 border" th:text="${role.correo}"></td>
                <td class="py-2 px-2 border min-w-[150px] whitespace-nowrap">
                    <div class="flex justify-center items-center gap-2">
                        <a th:href="@{'/administrador/editar/' + ${role.identificacion}}"
                           class="bg-purple-500 hover:bg-purple-600 text-white px-3 py-1 rounded shadow-sm text-sm">
                            Editar
                        </a>
                        <a th:href="@{'/administrador/eliminar/' + ${role.identificacion}}"
                           class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded shadow-sm text-sm">
                            Eliminar
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
