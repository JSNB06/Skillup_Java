<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Agregar Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-100 via-white to-purple-50">

<!-- Header -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<!-- Contenedor centrado -->
<div class="flex-grow flex items-center justify-center my-10">
    <div class="max-w-6xl w-full mx-auto bg-white p-10 rounded-3xl shadow-2xl border border-purple-200">
        <h2 class="text-3xl font-extrabold text-purple-700 text-center mb-10">Agregar Usuario</h2>

        <!-- Botón regresar -->
        <a th:href="@{/administrador/seleccionar}"
           class="inline-block mb-6 rounded-xl border border-purple-600 px-6 py-2 text-purple-700 hover:bg-purple-600 hover:text-white font-semibold transition">
            ← Regresar
        </a>

        <!-- Formulario -->
        <form th:action="@{/administrador/guardar}" method="post" th:object="${usuarios}"
              class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Identificación -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Identificación</label>
                <input type="text" th:field="*{identificacion}"
                       class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
            </div>

            <!-- Nombre -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                <input type="text" th:field="*{nombre}"
                       class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
            </div>

            <!-- Apellido 1 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Primer Apellido</label>
                <input type="text" th:field="*{apellido1}"
                       class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
            </div>

            <!-- Apellido 2 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Segundo Apellido</label>
                <input type="text" th:field="*{apellido2}"
                       class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
            </div>

            <!-- Correo -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
                <input type="text" th:field="*{correo}"
                       class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
            </div>

            <!-- Contraseña -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" th:field="*{contrasena}"
                       class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
            </div>

            <!-- Rol -->
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
                <select th:field="*{idRol}"
                        class="w-full rounded-xl border border-gray-300 p-3 shadow focus:ring-purple-500 focus:border-purple-500">
                    <option value="">-- Selecciona un rol --</option>
                    <option th:each="rol : ${roles}" th:value="${rol.idRol}" th:text="${rol.descripcion}"></option>
                </select>
            </div>

            <!-- Botones -->
            <div class="md:col-span-2 flex justify-center gap-6 mt-6">
                <input type="submit" value="Guardar"
                       class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-semibold shadow">
                <input type="reset" value="Cancelar"
                       class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-xl font-semibold shadow">
            </div>
        </form>
    </div>
</div>



</body>
</html>
