<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio Administrador - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-100 via-white to-purple-50">

<!-- HEADER -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<!-- CONTENIDO -->
<main class="flex-1 flex items-center justify-center px-6 py-12">

    <div class="max-w-6xl w-full bg-white p-10 rounded-2xl shadow-2xl border border-purple-200">

        <!-- Encabezado -->
        <h1 class="text-4xl font-extrabold text-purple-700 text-center mb-4">
            ¡Un gusto tenerte en SKILLUP!
        </h1>
        <p class="text-center text-lg text-gray-600 mb-12">
            Selecciona la acción que deseas realizar
        </p>

        <!-- FORMULARIO (MISMA RUTA DE SIEMPRE) -->
        <form th:action="@{/administrador/filtrar}" method="post">

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

                <!-- Administrador -->
                <button type="submit" name="rol" value="1"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">🛠️</div>
                    <h3 class="text-xl font-bold text-purple-800">Administrador</h3>
                </button>

                <!-- Estudiante -->
                <button type="submit" name="rol" value="2"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">🎓</div>
                    <h3 class="text-xl font-bold text-purple-800">Estudiante</h3>
                </button>

                <!-- Evaluador -->
                <button type="submit" name="rol" value="3"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">📝</div>
                    <h3 class="text-xl font-bold text-purple-800">Evaluador</h3>
                </button>

                <!-- Inscripciones -->
                <button type="submit" name="rol" value="cursos"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">📚</div>
                    <h3 class="text-xl font-bold text-purple-800">Inscripciones</h3>
                </button>

                <!-- Gestionar Cursos -->
                <button type="submit" name="rol" value="gestionarCursos"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">⚙️</div>
                    <h3 class="text-xl font-bold text-purple-800">Gestionar Cursos</h3>
                </button>

                <!-- Crear Curso -->
                <button type="submit" name="rol" value="crearCurso"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">➕</div>
                    <h3 class="text-xl font-bold text-purple-800">Crear Curso</h3>
                </button>

                <!-- Envío de Correos -->
                <button type="submit" name="rol" value="correo"
                        class="bg-purple-50 hover:bg-purple-200 border border-purple-300 rounded-xl
                        flex flex-col items-center justify-center text-center p-8 shadow-md
                        hover:shadow-xl transition">
                    <div class="text-5xl mb-3">✉️</div>
                    <h3 class="text-xl font-bold text-purple-800">Envío de Correos</h3>
                </button>

            </div>
        </form>
    </div>
</main>



</body>
</html>
