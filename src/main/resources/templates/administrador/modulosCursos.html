<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulos del Curso - SKILLUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div th:replace="layouts/headerAdministrador :: header"></div>

<main class="max-w-6xl mx-auto my-8 p-6">

    <!-- Botón Volver -->
    <div class="mb-6">
        <a th:href="@{/administrador/cursos/listar}"
           class="inline-flex items-center text-purple-700 hover:text-purple-900 font-medium transition">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Volver a Cursos
        </a>
    </div>

    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-lg border border-purple-200 p-6 mb-6">
        <h1 class="text-3xl font-bold text-purple-700 mb-2"
            th:text="'Módulos de: ' + ${curso.nombre}">
            Módulos del Curso
        </h1>
        <p class="text-gray-600" th:text="${curso.descripcion}">
            Descripción del curso
        </p>
    </div>

    <!-- Mensaje si no hay módulos -->
    <div th:if="${modulos == null or modulos.isEmpty()}"
         class="bg-white rounded-2xl shadow-lg p-12 text-center">
        <div class="text-6xl mb-4">📖</div>
        <h2 class="text-2xl font-bold text-gray-700 mb-2">Este curso no tiene módulos</h2>
        <p class="text-gray-500">Edita el curso para agregar módulos</p>
    </div>

    <!-- Lista de módulos -->
    <div th:if="${modulos != null and !modulos.isEmpty()}"
         class="space-y-4">

        <div th:each="modulo : ${modulos}"
             class="bg-white rounded-xl shadow-lg border border-gray-200 p-6 hover:shadow-xl transition">

            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="bg-purple-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold"
                              th:text="${modulo.orden}">1</span>
                        <h3 class="text-2xl font-bold text-purple-700"
                            th:text="${modulo.nombre}">
                            Nombre del Módulo
                        </h3>
                    </div>
                    <p class="text-gray-600 ml-13" th:text="${modulo.descripcion}">
                        Descripción del módulo
                    </p>
                </div>

                <!-- Botón gestionar contenidos -->
                <a th:href="@{/administrador/contenidos/modulo/{id}(id=${modulo.id})}"
                   class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-6 rounded-lg transition transform hover:scale-105">
                    📚 Gestionar Contenidos
                </a>
            </div>
        </div>
    </div>

</main>

<div th:replace="layouts/footer :: footer"></div>

</body>
</html>
