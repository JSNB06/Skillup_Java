<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillUp - Cursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- HEADER -->
<div th:replace="layouts/headerprincipal :: header"></div>

<!-- CONTENIDO -->
<main class="flex-1 max-w-6xl mx-auto px-6 py-10">

    <!-- Título -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Da tus primeros pasos.</h1>
        <p class="text-gray-600 mt-1">Descubre cursos de expertos del mundo.</p>
    </div>

    <!-- GRID DE CURSOS -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- CARD CURSO -->
        <div th:each="curso : ${cursos}"
             class="bg-white rounded-2xl shadow-md hover:shadow-xl transition flex flex-col overflow-hidden">

            <!-- Imagen -->
            <div class="h-40 w-full overflow-hidden">
                <img th:if="${curso.imagenUrl != null and !curso.imagenUrl.isEmpty()}"
                     th:src="${curso.imagenUrl}"
                     alt="Imagen del curso"
                     class="w-full h-full object-cover">

                <div th:if="${curso.imagenUrl == null or curso.imagenUrl.isEmpty()}"
                     class="w-full h-full bg-gradient-to-br from-purple-400 to-blue-500 flex items-center justify-center text-5xl">
                    📚
                </div>
            </div>

            <!-- Contenido -->
            <div class="p-5 flex-1 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-2"
                    th:text="${curso.nombre}">
                    Nombre del Curso
                </h2>

                <p class="text-sm text-gray-600 mb-4">
                    <span th:if="${curso.modulos != null}"
                          th:text="${curso.modulos.size()} + ' módulos disponibles'">
                        0 módulos disponibles
                    </span>
                    <span th:unless="${curso.modulos != null}">
                        Curso completo de habilidades blandas
                    </span>
                </p>

                <!-- Botón -->
                <div class="mt-auto">
                    <a th:href="@{/estudiante/cursos/{id}(id=${curso.id})}"
                       class="block text-center bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition font-semibold">
                        Saber Más
                    </a>
                </div>
            </div>
        </div>

        <!-- MENSAJE SIN CURSOS -->
        <div th:if="${cursos == null or cursos.isEmpty()}"
             class="col-span-full bg-yellow-50 border border-yellow-200 rounded-xl p-8 text-center">
            <p class="text-yellow-800 font-semibold text-lg">
                📚 No hay cursos disponibles en este momento
            </p>
            <p class="text-yellow-600 text-sm mt-2">
                Pronto habrá nuevos cursos para ti
            </p>
        </div>

    </section>
</main>



</body>
</html>
