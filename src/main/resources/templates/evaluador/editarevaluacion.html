<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Evaluación - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-white to-purple-50 min-h-screen flex flex-col">

<!-- Header -->
<div th:replace="layouts/headerEvaluador :: headerEvaluador"></div>

<!-- Contenido -->
<main class="flex-grow max-w-4xl mx-auto p-8">
    <h1 class="text-3xl font-bold text-center text-purple-700 mb-10">Editar Evaluación</h1>

    <form th:action="@{/evaluador/actualizarevaluacion}" method="post"
          th:object="${evaluacion}"
          class="bg-white p-8 rounded-2xl shadow-lg space-y-6 border border-purple-200">

        <!-- ID de la evaluación -->
        <input type="hidden" th:field="*{id}"/>

        <!-- evaluadorId (para el redirect correcto) -->
        <input type="hidden" name="evaluadorId" th:value="${evaluadorId}"/>

        <!-- Resultado -->
        <div>
            <label class="block font-semibold text-gray-700">Resultado (%)</label>
            <input type="number" th:field="*{resultado}" step="0.01" min="0" max="100"
                   required
                   class="w-full border border-purple-300 p-2 rounded focus:ring-2 focus:ring-purple-400">
        </div>

        <!-- Comentario -->
        <div>
            <label class="block font-semibold text-gray-700">Comentario</label>
            <textarea th:field="*{comentario}" rows="4"
                      class="w-full border border-purple-300 p-2 rounded focus:ring-2 focus:ring-purple-400"
                      placeholder="Modifica la retroalimentación..."></textarea>
        </div>

        <!-- Botón -->
        <div>
            <button type="submit"
                    class="bg-purple-500 text-white font-semibold py-2 px-4 rounded-lg w-full hover:bg-purple-600 transition">
                Guardar Cambios
            </button>
        </div>
    </form>
</main>

<!-- Footer -->
<div th:replace="layouts/footer :: footer"></div>

</body>
</html>
