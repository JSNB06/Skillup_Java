<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Evaluación - SkillUp</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Drag & Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            new Sortable(document.getElementById("preguntas-container"), {
                animation: 150,
                ghostClass: 'bg-purple-100'
            });
        });

        function agregarPregunta() {
            const container = document.getElementById("preguntas-container");
            const index = container.children.length;

            const template = `
    <div class="pregunta bg-gradient-to-br from-purple-50 to-white
                border border-purple-200/60 rounded-2xl p-6
                shadow-[0_10px_25px_rgba(124,_58,_237,_0.15)]
                hover:shadow-[0_20px_40px_rgba(124,_58,_237,_0.25)]
                transition-all duration-300 cursor-move">

        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold text-purple-700">
                Pregunta ${index + 1}
            </h3>
            <button type="button" onclick="eliminarPregunta(this)"
                    class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded-full p-2 transition">
                ✕
            </button>
        </div>

        <input name="preguntas[${index}].pregunta"
               placeholder="Enunciado de la pregunta"
               class="w-full mb-4 p-3 rounded-xl border border-gray-300
                      focus:border-purple-500 focus:ring-4 focus:ring-purple-200
                      transition-all outline-none"
               required>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input name="preguntas[${index}].opcionA" placeholder="Opción A"
                   class="p-3 rounded-xl border border-gray-300
                          focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all" required>
            <input name="preguntas[${index}].opcionB" placeholder="Opción B"
                   class="p-3 rounded-xl border border-gray-300
                          focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all" required>
            <input name="preguntas[${index}].opcionC" placeholder="Opción C"
                   class="p-3 rounded-xl border border-gray-300
                          focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all" required>
            <input name="preguntas[${index}].opcionD" placeholder="Opción D"
                   class="p-3 rounded-xl border border-gray-300
                          focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all" required>
        </div>

        <div class="mt-5">
            <label class="block mb-1 text-sm font-medium text-gray-700">
                Respuesta correcta
            </label>
            <select name="preguntas[${index}].respuestaCorrecta"
                    class="w-full p-3 rounded-xl border border-gray-300
                           focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all"
                    required>
                <option value="">Selecciona</option>
                <option value="A">Opción A</option>
                <option value="B">Opción B</option>
                <option value="C">Opción C</option>
                <option value="D">Opción D</option>
            </select>
        </div>
    </div>`;
            container.insertAdjacentHTML("beforeend", template);
        }

        function eliminarPregunta(btn) {
            btn.closest(".pregunta").remove();
            renumerar();
        }

        function renumerar() {
            document.querySelectorAll(".pregunta").forEach((p, i) => {
                p.querySelector("h3").textContent = `Pregunta ${i + 1}`;
            });
        }

        function mostrarVistaPrevia() {
            const modal = document.getElementById("previewModal");
            const content = document.getElementById("previewContent");
            content.innerHTML = "";

            document.querySelectorAll(".pregunta").forEach((p, i) => {
                const pregunta = p.querySelector("input[name*='.pregunta']").value;
                const opciones = p.querySelectorAll("input[name*='opcion']");

                content.innerHTML += `
        <div class="mb-4">
            <p class="font-semibold">${i + 1}. ${pregunta}</p>
            ${[...opciones].map(op => `
                <label class="block ml-4 text-gray-700">
                    <input type="radio" disabled> ${op.value}
                </label>`).join("")}
        </div>`;
            });

            modal.classList.remove("hidden");
        }

        function cerrarVistaPrevia() {
            document.getElementById("previewModal").classList.add("hidden");
        }
    </script>
</head>

<body class="flex flex-col min-h-screen bg-gray-100">

<!-- Header -->
<header class="bg-purple-700 text-white shadow">
    <div th:replace="layouts/headerEvaluador :: headerEvaluador"></div>
</header>

<!-- Main -->
<main class="flex-grow bg-gradient-to-br from-blue-100 via-white to-purple-50 p-10">
    <div class="max-w-5xl mx-auto bg-white/90 backdrop-blur rounded-2xl p-10
            shadow-[0_20px_50px_rgba(8,_112,_184,_0.15)] border border-gray-100">

        <h1 class="text-3xl font-bold text-center text-purple-700 mb-8">
            Registrar Evaluación
        </h1>

        <form th:action="@{/evaluador/crearEvaluacion}" method="post" class="space-y-8">

            <!-- Curso -->
            <div>
                <label class="block mb-2 font-semibold text-gray-700">Curso</label>
                <select name="idCurso"
                        class="w-full p-3 rounded-xl border border-gray-300
                       focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all"
                        required>
                    <option value="">-- Selecciona un curso --</option>
                    <option th:each="curso : ${cursos}"
                            th:value="${curso.id}"
                            th:text="${curso.nombre}">
                    </option>
                </select>
            </div>

            <!-- Comentarios -->
            <div>
                <label class="block mb-2 font-semibold text-gray-700">Comentarios</label>
                <textarea name="comentarios" rows="3"
                          class="w-full p-3 rounded-xl border border-gray-300
                         focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition-all"
                          placeholder="Observaciones generales"></textarea>
            </div>

            <!-- Preguntas -->
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-purple-700">
                        Preguntas
                    </h2>
                    <button type="button" onclick="mostrarVistaPrevia()"
                            class="bg-gradient-to-r from-blue-500 to-blue-600
                           hover:from-blue-600 hover:to-blue-700
                           text-white px-4 py-2 rounded-xl shadow-md
                           hover:shadow-lg active:scale-95 transition-all">
                        👁 Vista previa
                    </button>
                </div>

                <div id="preguntas-container" class="space-y-6"></div>

                <button type="button" onclick="agregarPregunta()"
                        class="mt-6 bg-gradient-to-r from-purple-600 to-purple-700
                       hover:from-purple-700 hover:to-purple-800
                       text-white px-6 py-3 rounded-xl font-medium shadow-md
                       hover:shadow-lg active:scale-95 transition-all">
                    ➕ Agregar Pregunta
                </button>
            </div>

            <!-- Submit -->
            <div class="pt-6 border-t">
                <button type="submit"
                        class="w-full md:w-auto bg-gradient-to-r from-green-500 to-green-600
                       hover:from-green-600 hover:to-green-700
                       text-white px-8 py-3 rounded-xl font-semibold
                       shadow-lg hover:shadow-xl active:scale-95 transition-all">
                    Crear Evaluación
                </button>
            </div>

        </form>
    </div>
</main>

<!-- Modal Vista Previa -->
<div id="previewModal"
     class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-2xl shadow-2xl">
        <h2 class="text-xl font-bold text-purple-700 mb-4">Vista previa</h2>
        <div id="previewContent" class="space-y-3"></div>
        <button onclick="cerrarVistaPrevia()"
                class="mt-4 bg-purple-600 hover:bg-purple-700
                       text-white px-4 py-2 rounded-xl shadow transition">
            Cerrar
        </button>
    </div>
</div>

<!-- Footer -->
<footer class="bg-purple-700 text-white mt-auto">
    <div th:replace="layouts/footer :: footer"></div>
</footer>

</body>
</html>
