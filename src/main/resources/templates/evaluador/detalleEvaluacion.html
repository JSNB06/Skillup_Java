<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Evaluación - SKILLUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-100 via-white to-purple-50">

<div th:replace="layouts/headerEvaluador :: headerEvaluador"></div>

<main class="max-w-6xl mx-auto my-8 p-6">

    <!-- Volver -->
    <div class="mb-6">
        <a th:href="@{/evaluador/evaluaciones/historial}"
           class="inline-flex items-center text-purple-700 hover:text-purple-900 font-medium transition">
            ← Volver al Historial
        </a>
    </div>

    <!-- Información General -->
    <div class="bg-white rounded-2xl shadow-lg border-2 p-6 mb-8"
         th:classappend="${evaluacion.estado == 'APROBADA' ? 'border-green-400' : 'border-purple-400'}">

        <h1 class="text-3xl font-bold text-purple-700 mb-2">
            Detalle de Evaluación
        </h1>

        <p class="text-xl text-gray-700 mb-2"
           th:text="${evaluacion.curso != null ? evaluacion.curso.nombre : 'Curso no asignado'}">
            Nombre del Curso
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 text-gray-600">
            <p>📅 Realizada:
                <span th:text="${#temporals.format(evaluacion.fechaEvaluacion,'dd/MM/yyyy HH:mm')}"></span>
            </p>
            <p th:if="${evaluacion.fechaRevision != null}">
                ✅ Revisada:
                <span th:text="${#temporals.format(evaluacion.fechaRevision,'dd/MM/yyyy HH:mm')}"></span>
            </p>
            <p>👤 Estudiante ID:
                <span th:text="${evaluacion.idUsuario}"></span>
            </p>
            <p>📊 Puntaje:
                <span th:text="${evaluacion.puntajeObtenido}"></span> /
                <span th:text="${evaluacion.puntajeTotal}"></span>
            </p>
        </div>

        <!-- Estado -->
        <div class="mt-4">
            <span th:if="${evaluacion.estado == 'APROBADA'}"
                  class="bg-green-500 text-white px-5 py-2 rounded-full font-bold">
                ✓ APROBADA
            </span>
            <span th:if="${evaluacion.estado == 'REPROBADA'}"
                  class="bg-red-500 text-white px-5 py-2 rounded-full font-bold">
                ✗ REPROBADA
            </span>
        </div>

        <!-- Comentarios -->
        <div th:if="${evaluacion.comentarios != null and evaluacion.comentarios != ''}"
             class="mt-6 bg-gray-50 p-4 rounded-lg border-l-4"
             th:classappend="${evaluacion.estado == 'APROBADA' ? 'border-green-500' : 'border-purple-500'}">
            <h4 class="font-bold text-gray-700 mb-2">💬 Comentarios del Evaluador</h4>
            <p class="text-gray-600" th:text="${evaluacion.comentarios}"></p>
        </div>
    </div>

    <!-- Detalle de Respuestas -->
    <div class="space-y-6">

        <div th:each="respuesta, iterStat : ${evaluacion.respuestas}"
             class="bg-white rounded-2xl shadow-lg border-2 p-6"
             th:classappend="${respuesta.esCorrecta ? 'border-green-400' : 'border-purple-400'}">

            <div class="flex gap-4">

                <!-- Número -->
                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white"
                     th:classappend="${respuesta.esCorrecta ? 'bg-green-600' : 'bg-purple-600'}">
                    <span th:text="${iterStat.index + 1}"></span>
                </div>

                <div class="flex-1">

                    <!-- Pregunta -->
                    <h3 class="text-lg font-bold text-gray-800 mb-4"
                        th:text="${respuesta.pregunta.pregunta}">
                        ¿Pregunta?
                    </h3>

                    <!-- TÍTULO: Respuesta del estudiante -->
                    <p class="text-sm font-semibold text-purple-700 mb-3">
                        Respuesta del estudiante
                    </p>

                    <!-- Opciones -->
                    <div class="space-y-2">

                        <!-- Opción A -->
                        <div th:classappend="${respuesta.respuestaSeleccionada == 'A' ?
                             (respuesta.esCorrecta ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500') :
                             (respuesta.pregunta.respuestaCorrecta == 'A' ? 'bg-green-50 border-green-500' : 'bg-gray-50 border-gray-200')}"
                             class="p-3 border-2 rounded-lg">
                            <strong>A)</strong>
                            <span th:text="${respuesta.pregunta.opcionA}"></span>
                        </div>

                        <!-- Opción B -->
                        <div th:classappend="${respuesta.respuestaSeleccionada == 'B' ?
                             (respuesta.esCorrecta ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500') :
                             (respuesta.pregunta.respuestaCorrecta == 'B' ? 'bg-green-50 border-green-500' : 'bg-gray-50 border-gray-200')}"
                             class="p-3 border-2 rounded-lg">
                            <strong>B)</strong>
                            <span th:text="${respuesta.pregunta.opcionB}"></span>
                        </div>

                        <!-- Opción C -->
                        <div th:classappend="${respuesta.respuestaSeleccionada == 'C' ?
                             (respuesta.esCorrecta ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500') :
                             (respuesta.pregunta.respuestaCorrecta == 'C' ? 'bg-green-50 border-green-500' : 'bg-gray-50 border-gray-200')}"
                             class="p-3 border-2 rounded-lg">
                            <strong>C)</strong>
                            <span th:text="${respuesta.pregunta.opcionC}"></span>
                        </div>

                        <!-- Opción D -->
                        <div th:classappend="${respuesta.respuestaSeleccionada == 'D' ?
                             (respuesta.esCorrecta ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500') :
                             (respuesta.pregunta.respuestaCorrecta == 'D' ? 'bg-green-50 border-green-500' : 'bg-gray-50 border-gray-200')}"
                             class="p-3 border-2 rounded-lg">
                            <strong>D)</strong>
                            <span th:text="${respuesta.pregunta.opcionD}"></span>
                        </div>
                    </div>

                    <!-- Puntaje -->
                    <div class="mt-3 font-semibold">
                        <span th:if="${respuesta.esCorrecta}" class="text-green-600">
                            +<span th:text="${respuesta.puntajeObtenido}"></span> puntos
                        </span>
                        <span th:unless="${respuesta.esCorrecta}" class="text-red-600">
                            0 puntos (Máx: <span th:text="${respuesta.pregunta.puntaje}"></span>)
                        </span>
                    </div>

                </div>
            </div>
        </div>
    </div>

</main>



</body>
</html>
