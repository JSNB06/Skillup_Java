<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Estudiantes - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-white to-purple-50 min-h-screen flex flex-col">

<!-- Header -->
<div th:replace="layouts/headerEvaluador :: headerEvaluador"></div>

<!-- Contenido -->
<main class="flex-grow max-w-6xl mx-auto p-8">
    <h1 class="text-3xl font-bold text-center text-purple-700 mb-8">Estudiantes Inscritos</h1>

    <div class="overflow-x-auto bg-white border border-purple-200 rounded-xl shadow-lg p-4">
        <table class="min-w-full text-sm text-center">
            <thead class="bg-purple-200 text-gray-800">
            <tr>
                <th class="py-2 px-4 border">Identificación</th>
                <th class="py-2 px-4 border">Nombre</th>
                <th class="py-2 px-4 border">Correo</th>
            </tr>
            </thead>
            <tbody>
            <!-- Recorremos la lista de estudiantes -->
            <tr th:each="est : ${estudiantes}" class="hover:bg-purple-50">
                <td class="py-2 px-4 border" th:text="${est.identificacion}"></td>
                <td class="py-2 px-4 border"
                    th:text="${est.nombre} + ' ' + ${est.apellido1} + ' ' + ${est.apellido2}"></td>
                <td class="py-2 px-4 border" th:text="${est.correo}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Footer -->
<div th:replace="layouts/footer :: footer"></div>

</body>
</html>
