<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Estudiantes - SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-purple-50 min-h-screen flex flex-col">

<!-- Header -->
<div th:replace="layouts/headerEvaluador :: headerEvaluador"></div>

<!-- Contenido -->
<main class="flex-grow w-full max-w-full mx-auto px-4 lg:px-12 py-8">

    <h1 class="text-3xl font-bold text-center text-purple-700 mb-8">
        Estudiantes Inscritos
    </h1>

    <div class="overflow-x-auto bg-white border border-purple-200 rounded-xl shadow-xl p-6">
        <table class="w-full text-base text-center">
            <thead class="bg-purple-200 text-gray-800">
            <tr>
                <th class="py-4 px-6 border">Identificación</th>
                <th class="py-4 px-6 border">Nombre Completo</th>
                <th class="py-4 px-6 border">Correo Electrónico</th>
            </tr>
            </thead>
            <tbody>
            <!-- Recorremos la lista de estudiantes -->
            <tr th:each="est : ${estudiantes}" class="hover:bg-purple-50 transition">
                <td class="py-4 px-6 border" th:text="${est.identificacion}"></td>
                <td class="py-4 px-6 border"
                    th:text="${est.nombre} + ' ' + ${est.apellido1} + ' ' + ${est.apellido2}">
                </td>
                <td class="py-4 px-6 border" th:text="${est.correo}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

</body>
</html>
