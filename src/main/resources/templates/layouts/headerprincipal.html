<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'SkillUp'">SkillUp</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body>

<!-- ===== HEADER GENERAL ===== -->
<header th:fragment="headerGeneral">
    <div class="bg-white shadow-md w-full">
        <div class="flex justify-between items-center px-6 py-4">

            <!-- Logo -->
            <div class="flex items-center gap-2">
                <a th:href="@{/estudiante/lobby}" class="text-2xl font-bold">
                    <span class="text-black">SKILL</span><span class="text-purple-700">UP</span>
                </a>
            </div>

            <!-- Navegación (solo usuarios autenticados) -->
            <nav class="flex gap-4 items-center font-medium"
                 th:if="${session.roles_sistema != null}">

                <a th:href="@{/estudiante/lobby}"
                   class="text-blue-600 hover:text-blue-800 transition">
                    Inicio
                </a>

                <a th:href="@{/estudiante/mi-cuenta}"
                   class="text-blue-600 hover:text-blue-800 transition">
                    Mi cuenta
                </a>

                <a th:href="@{/login/salir}"
                   class="text-red-600 hover:text-red-800 transition">
                    Cerrar sesión
                </a>
            </nav>

        </div>
    </div>
</header>
<!-- ===== FIN HEADER GENERAL ===== -->

</body>
</html>
