<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} ?: 'SkillUp'">SkillUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gray-100">

<!-- HEADER -->
<header th:fragment="header" class="bg-white shadow-md w-full">
    <div class="flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-2">
            <a th:href="@{/home}" class="text-2xl font-bold">
                <span class="text-black">SKILL</span><span class="text-purple-700">UP</span>
            </a>
        </div>
        <div class="flex gap-3">
            <a th:href="@{/login}" class="border border-blue-500 text-blue-500 px-4 py-1 rounded hover:bg-blue-50">Iniciar sesión</a>
            <a th:href="@{/registro}" class="bg-blue-500 text-white px-4 py-1 rounded hover:bg-blue-600">Registrarse</a>
        </div>
    </div>
</header>

</body>
</html>
