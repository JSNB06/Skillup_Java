<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Consumo — SKILLUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-purple-200 via-white to-blue-100 flex flex-col">

<!-- Header opcional -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<main class="flex-grow py-12">
    <div class="max-w-4xl mx-auto px-6">

        <!-- Título principal -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-purple-700 drop-shadow">
                Prueba de Consumo — Web Service Interno
            </h1>
            <p class="mt-3 text-gray-600 text-lg">
                Estos datos se muestran a través del consumo del Web Service implementado en Spring Boot.
            </p>
        </div>

        <!-- Contenedor -->
        <div class="bg-white shadow-2xl rounded-2xl p-8 border border-purple-200">

            <h2 class="text-2xl font-semibold text-purple-700 mb-6">
                👇 Datos recibidos del API Interno
            </h2>

            <!-- Lista estilizada -->
            <ul class="space-y-4">
                <li th:each="u : ${usuarios}"
                    class="p-4 rounded-xl shadow-md bg-purple-50 border border-purple-200 text-gray-700 hover:bg-purple-100 transition cursor-pointer">
                    <span class="block text-lg font-medium text-purple-700" th:text="${u['name']}"></span>
                </li>
            </ul>

        </div>

        <!-- Botón volver -->
        <div class="text-center mt-10">
            <a th:href="@{/administrador/seleccionar}"
               class="inline-block bg-purple-600 text-white py-3 px-8 rounded-xl shadow-lg hover:bg-purple-700 transition transform hover:scale-105">
                Volver al menú
            </a>
        </div>

    </div>
</main>

<!-- Footer opcional -->
<div th:replace="layouts/footer :: footer"></div>

</body>
</html>
