<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Envío de Correos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col min-h-screen bg-gradient-to-br from-blue-100 via-white to-purple-50">

<!-- Header -->
<div th:replace="layouts/headerAdministrador :: header"></div>

<main class="flex-grow flex items-center justify-center">
    <div class="max-w-4xl w-full mx-auto bg-white p-10 rounded-2xl shadow-2xl border border-purple-200 my-10">

        <h1 class="text-4xl font-extrabold text-purple-700 text-center mb-2">
            ✉️ Envío de Correos Masivo
        </h1>

        <p class="text-center text-gray-600 mb-12">
            Escribe el asunto y el contenido del correo que será enviado a todos los usuarios seleccionados.
        </p>

        <!-- FORMULARIO -->
        <form th:action="@{/correo/enviar}" th:object="${notification}" method="post" class="space-y-8">

            <!-- Asunto -->
            <div>
                <label class="block text-lg font-semibold text-purple-700 mb-2">Asunto del correo:</label>
                <input type="text" th:field="*{subject}" required
                       class="w-full p-4 border border-purple-300 rounded-xl shadow-md focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <select id="plantilla" onchange="cargarPlantilla()"
                    class="w-full p-3 border border-purple-300 rounded-xl shadow-md">
                <option value="">-- Selecciona plantilla --</option>
                <option value="bienvenida">Correo de Bienvenida</option>
                <option value="nuevoCurso">Nuevo Curso Disponible</option>
            </select>

            <textarea id="contenidoHTML" th:field="*{htmlBody}" rows="8"
                      class="w-full p-4 border border-purple-300 rounded-xl shadow-md"></textarea>

            <script>
                async function cargarPlantilla() {
                    let nombre = document.getElementById("plantilla").value;
                    let textarea = document.getElementById("contenidoHTML");

                    if (!nombre) {
                        textarea.value = "";
                        return;
                    }

                    let response = await fetch(`/plantillas/${nombre}`);
                    if (response.ok) {
                        textarea.value = await response.text();
                    } else {
                        textarea.value = "Error: No se pudo cargar la plantilla.";
                    }
                }
            </script>


            <!-- Botón enviar -->
            <div class="text-center">
                <button type="submit"
                        class="bg-purple-700 hover:bg-purple-800 text-white text-lg font-semibold py-3 px-10 rounded-xl shadow-lg transition">
                    🚀 Enviar Correo
                </button>
            </div>
        </form>

        <!-- RESULTADO -->
        <div th:if="${resultado}" class="mt-10 text-center">
            <h3 class="text-xl font-bold text-green-600" th:text="${resultado}"></h3>
        </div>

    </div>
</main>



</body>
</html>
