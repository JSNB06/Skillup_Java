<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta</title>
    <!-- Alpine.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <div th:replace="layouts/headerprincipal :: header"></div>

    <div class="bg-gray-100 min-h-screen px-4 py-8">
        
        <!-- Mensaje flash -->
        <div th:if="${mensaje != null}" 
             class="bg-green-100 text-green-700 px-4 py-3 rounded mb-4 border border-green-300"
             th:text="${mensaje}">
        </div>

        <div class="max-w-7xl mx-auto lg:grid-cols-4 gap-6">

            <!-- Perfil principal -->
            <div class="lg:col-span-3 bg-white rounded-xl shadow p-6">
                
                <!-- Info básica -->
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img th:src="@{/assets/Imagenes/default_profile.png}" 
                             alt="Foto de perfil" 
                             class="w-20 h-20 rounded-full border object-cover">
                        <div>
                            <h2 class="text-xl font-semibold text-gray-800" 
                                th:text="${usuario.nombre} + ' ' + ${usuario.apellido1} + ' ' + ${usuario.apellido2}">
                            </h2>

                            <p class="text-sm text-gray-500">
                                🇨🇴 Colombia · 
                                <a th:href="'mailto:' + ${usuario.correo}" 
                                   class="text-blue-600 hover:underline"
                                   th:text="${usuario.correo}">
                                </a>
                            </p>
                        </div>
                    </div>
                    <a th:href="@{/micuenta/editar}" 
                       class="mt-4 md:mt-0 px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">
                        Editar perfil
                    </a>
                </div>

                <!-- Tabs -->
                <div x-data="{ tab: 'curriculum' }">
                    <!-- Tabs -->
                    <ul class="flex gap-8 text-sm font-medium border-b border-gray-200 mb-4">
                        <li>
                            <button @click="tab = 'curriculum'" 
                                    :class="tab === 'curriculum' ? 'text-blue-600 border-b-2 border-blue-600 pb-2' : 'text-gray-600 pb-2'" 
                                    class="focus:outline-none">
                                Currículum
                            </button>
                        </li>
                        <li>
                            <button @click="tab = 'estudios'" 
                                    :class="tab === 'estudios' ? 'text-blue-600 border-b-2 border-blue-600 pb-2' : 'text-gray-600 pb-2'" 
                                    class="focus:outline-none">
                                Estudios
                            </button>
                        </li>
                    </ul>

                    <!-- Contenido dinámico -->
                    <div x-show="tab === 'curriculum'">
                        <div th:replace="usuarios/seccion_curriculum :: contenido"></div>
                    </div>

                    <div x-show="tab === 'estudios'">
                        <div th:replace="usuarios/seccion_estudios :: contenido"></div>
                    </div>
                </div>
            </div>
        </div>
        <br>
    </div>

    <!-- Footer -->
    <div th:replace="layouts/footer :: footer"></div>

</body>
</html>
